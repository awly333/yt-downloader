appId: com.awly333.yt-downloader
productName: YT Downloader
copyright: Copyright © 2024 awly333

# Icon (electron-builder selects .ico on Win, .icns on Mac, .png on Linux)
icon: build/icon

directories:
  output: release
  buildResources: build

# Files to include in the package
# electron-builder automatically includes node_modules for packages in "dependencies"
files:
  - dist/**
  - dist-electron/**
  - package.json

# Bundle yt-dlp and ffmpeg so users need no pre-installed tools
extraResources:
  - from: resources/bin/
    to: bin/
    filter:
      - "yt-dlp*"
      - "ffmpeg*"
      - "ffprobe*"
  - from: build/icon.png
    to: icon.png
  - from: build/icon.ico
    to: icon.ico

# ─── Windows ─────────────────────────────────────────────────────────────────
win:
  icon: build/icon.ico
  signAndEditExecutable: false
  verifyUpdateCodeSignature: false
  target:
    - target: nsis
      arch: [x64]
  artifactName: YT-Downloader-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: YT Downloader
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  deleteAppDataOnUninstall: false

# ─── macOS ───────────────────────────────────────────────────────────────────
mac:
  icon: build/icon.png
  category: public.app-category.utilities
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  artifactName: YT-Downloader-${version}-mac-${arch}.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

dmg:
  title: YT Downloader ${version}
  icon: build/icon.png
  iconSize: 80
  window:
    width: 540
    height: 380
  contents:
    - x: 150
      y: 195
      type: file
    - x: 390
      y: 195
      type: link
      path: /Applications

# ─── Linux ───────────────────────────────────────────────────────────────────
linux:
  icon: build/icon.png
  category: Network
  description: "A beautiful video downloader powered by yt-dlp"
  target:
    - target: AppImage
      arch: [x64]
  artifactName: YT-Downloader-${version}-linux-${arch}.${ext}

# ─── Auto-updater — publish to GitHub Releases ───────────────────────────────
publish:
  provider: github
  owner: awly333
  repo: yt-downloader
  releaseType: release
